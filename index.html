<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zombie Survival</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      #hud {
        position: fixed; top: 0; left: 0; width: 100%; padding: 20px;
        color: #fff; font-family: 'Courier New', monospace;
        pointer-events: none; z-index: 10;
      }
      #hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
      #hud-left {}
      #hud-right { text-align: right; }
      #hud-score { font-size: 28px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
      #hud-wave { font-size: 16px; color: #ff6644; margin-top: 4px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
      #hud-ammo { font-size: 22px; color: #ccc; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
      #hud-ammo span { font-size: 36px; color: #fff; }

      #hud-bottom {
        position: fixed; bottom: 20px; left: 20px; right: 20px;
        display: flex; justify-content: space-between; align-items: flex-end;
        pointer-events: none; z-index: 10;
        font-family: 'Courier New', monospace;
      }
      #hud-hp-bar {
        width: 250px; height: 8px; background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; overflow: hidden;
      }
      #hud-hp-fill { height: 100%; background: #4f4; transition: width 0.3s; border-radius: 4px; }
      #hud-hp-label { color: #aaa; font-size: 12px; margin-bottom: 4px; }
      #hud-kills { color: #aaa; font-size: 14px; }
      #hud-kills span { color: #ff4444; font-size: 20px; font-weight: bold; }

      #crosshair {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 24px; height: 24px; pointer-events: none; z-index: 10;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: rgba(255,255,255,0.7);
      }
      #crosshair::before { width: 2px; height: 8px; left: 50%; top: 0; transform: translateX(-50%); box-shadow: 0 16px 0 rgba(255,255,255,0.7); }
      #crosshair::after { height: 2px; width: 8px; top: 50%; left: 0; transform: translateY(-50%); box-shadow: 16px 0 0 rgba(255,255,255,0.7); }

      #overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.8); z-index: 20; color: #fff;
        font-family: 'Courier New', monospace;
      }
      #overlay h1 { font-size: 72px; color: #f44; margin-bottom: 10px; text-shadow: 0 0 30px #f00, 0 0 60px rgba(255,0,0,0.3); letter-spacing: 4px; }
      #overlay .subtitle { font-size: 16px; color: #666; margin-bottom: 40px; letter-spacing: 8px; }
      #overlay p { font-size: 20px; color: #aaa; }
      #overlay .blink { animation: blink 1.2s infinite; }
      @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }
      #overlay.hidden { display: none; }

      #auto-play-btn {
        margin-top: 20px; padding: 12px 32px; font-size: 16px;
        font-family: 'Courier New', monospace; cursor: pointer;
        background: transparent; color: #4f4; border: 1px solid #4f4;
        letter-spacing: 2px; transition: all 0.2s;
      }
      #auto-play-btn:hover { background: #4f4; color: #000; }

      #auto-badge {
        position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
        padding: 6px 20px; font-size: 12px; letter-spacing: 3px;
        font-family: 'Courier New', monospace;
        color: #4f4; border: 1px solid rgba(68,255,68,0.4);
        background: rgba(0,40,0,0.5); z-index: 10;
        animation: blink 2s infinite;
      }
      #auto-badge.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div id="hud-top">
        <div id="hud-left">
          <div id="hud-score">0</div>
          <div id="hud-wave">WAVE 1</div>
        </div>
        <div id="hud-right">
          <div id="hud-ammo"><span>30</span> / 30</div>
        </div>
      </div>
    </div>
    <div id="hud-bottom">
      <div>
        <div id="hud-hp-label">HP</div>
        <div id="hud-hp-bar"><div id="hud-hp-fill" style="width:100%"></div></div>
      </div>
      <div id="hud-kills">KILLS <span>0</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="overlay">
      <h1>ZOMBIE SURVIVAL</h1>
      <div class="subtitle">SURVIVE THE HORDE</div>
      <p class="blink">CLICK TO START</p>
      <button id="auto-play-btn">AUTO PLAY</button>
    </div>
    <div id="auto-badge" class="hidden">AI AUTO PLAY</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
